<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bsky-viz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #e0e0e0; }
    .header { padding: 1.5rem 2rem; border-bottom: 1px solid #1a1a2e; display: flex; align-items: center; gap: 1rem; }
    .header h1 { font-size: 1.5rem; color: #0085ff; }
    .controls { padding: 1.5rem 2rem; display: flex; gap: 1rem; align-items: center; }
    .controls input { padding: 0.5rem 1rem; border: 1px solid #333; border-radius: 6px; background: #111; color: #e0e0e0; font-size: 1rem; width: 350px; }
    .controls button { padding: 0.5rem 1.5rem; border: none; border-radius: 6px; background: #0085ff; color: white; cursor: pointer; font-size: 1rem; }
    .controls button:hover { background: #006acc; }
    .controls button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { padding: 0 2rem; color: #888; font-size: 0.9rem; min-height: 1.5rem; }
    .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; padding: 1.5rem 2rem; }
    .card { background: #111; border: 1px solid #222; border-radius: 8px; padding: 1rem; text-align: center; }
    .card .value { font-size: 2rem; font-weight: bold; color: #0085ff; }
    .card .label { font-size: 0.85rem; color: #888; margin-top: 0.25rem; }
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; padding: 1.5rem 2rem; }
    .chart-container { background: #111; border: 1px solid #222; border-radius: 8px; padding: 1rem; }
    .chart-container h3 { margin-bottom: 0.75rem; font-size: 1rem; color: #ccc; }
    .chart { width: 100%; height: 350px; }
    .chart.tall { height: 500px; }
    .hidden { display: none; }
    .date-range { padding: 12px 20px; display: flex; align-items: center; gap: 8px; }
    .date-range .crumb { cursor: pointer; color: #0085ff; font-size: 14px; }
    .date-range .crumb:hover { text-decoration: underline; }
    .date-range .crumb.active { color: #fff; cursor: default; }
    .date-range .separator { color: #666; }
    .tab-btn { padding: 4px 12px; border: 1px solid #333; border-radius: 4px; background: #1a1a2e; color: #888; cursor: pointer; font-size: 0.85rem; }
    .tab-btn:hover { background: #222; color: #ccc; }
    .tab-btn.active { background: #0085ff; color: #fff; border-color: #0085ff; }
    @media (max-width: 900px) { .charts { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>bsky-viz</h1>
    <span style="color:#666">ATproto Repo Metadata Analyzer</span>
  </div>
  <div class="controls">
    <input type="text" id="did-input" placeholder="Enter DID or handle (e.g., alice.bsky.social)" />
    <button id="load-btn">Analyze</button>
    <select id="repo-select" style="padding:0.5rem;background:#111;color:#e0e0e0;border:1px solid #333;border-radius:6px;">
      <option value="">Previously analyzed...</option>
    </select>
  </div>
  <div class="status" id="status"></div>
  <div id="dashboard" class="hidden">
    <div style="display: flex; justify-content: space-between; align-items: center; padding-right: 20px;">
      <div id="date-range" class="date-range hidden">
        <span class="breadcrumb" id="date-breadcrumb"></span>
      </div>
      <div id="timezone-container" class="hidden" style="display: flex; align-items: center; gap: 8px;">
        <span id="timezone-label" style="font-size: 0.9rem; color: #888;"></span>
        <select id="timezone-select" style="padding:0.25rem;background:#111;color:#e0e0e0;border:1px solid #333;border-radius:4px;font-size:0.9rem;">
          <option value="local">Local</option>
          <option value="-12">UTC-12</option>
          <option value="-11">UTC-11</option>
          <option value="-10">UTC-10</option>
          <option value="-9">UTC-9</option>
          <option value="-8">UTC-8</option>
          <option value="-7">UTC-7</option>
          <option value="-6">UTC-6</option>
          <option value="-5">UTC-5</option>
          <option value="-4">UTC-4</option>
          <option value="-3">UTC-3</option>
          <option value="-2">UTC-2</option>
          <option value="-1">UTC-1</option>
          <option value="0">UTC</option>
          <option value="1">UTC+1</option>
          <option value="2">UTC+2</option>
          <option value="3">UTC+3</option>
          <option value="4">UTC+4</option>
          <option value="5">UTC+5</option>
          <option value="6">UTC+6</option>
          <option value="7">UTC+7</option>
          <option value="8">UTC+8</option>
          <option value="9">UTC+9</option>
          <option value="10">UTC+10</option>
          <option value="11">UTC+11</option>
          <option value="12">UTC+12</option>
          <option value="13">UTC+13</option>
          <option value="14">UTC+14</option>
        </select>
      </div>
    </div>
    <div class="summary-cards" id="summary-cards"></div>
    <div id="outlier-status" class="hidden" style="margin: 0 2rem 1rem 2rem; padding: 12px 16px; background: #1a1a2e; border: 1px solid #333; border-radius: 6px; color: #888; font-size: 0.9rem; display: flex; align-items: center; gap: 12px;"></div>
    <div id="embedding-status" class="hidden" style="margin: 0 2rem 1rem 2rem; padding: 12px 16px; background: #1a1a2e; border: 1px solid #333; border-radius: 6px; color: #888; font-size: 0.9rem;"></div>
    <div class="chart-container" id="themeriver-container" style="margin: 0 2rem 1.5rem 2rem;" hidden>
      <h3>Topic Clusters Over Time</h3>
      <div id="themeriver-switcher" style="margin-bottom: 0.5rem;">
        <button class="tab-btn active" data-mode="normalized">Proportional</button>
        <button class="tab-btn" data-mode="absolute">Volume</button>
      </div>
      <div class="chart tall" id="themeriver-chart" style="height: 400px;"></div>
    </div>
    <div class="charts">
      <div class="chart-container" style="grid-column: span 2;">
        <h3>Activity Heatmap</h3>
        <div id="heatmap-switcher" style="margin-bottom: 0.5rem;">
          <button class="tab-btn active" data-collection="">All</button>
          <button class="tab-btn" data-collection="app.bsky.feed.post">Posts+Replies</button>
          <button class="tab-btn" data-collection="app.bsky.feed.like">Likes</button>
          <button class="tab-btn" data-collection="app.bsky.feed.repost">Reposts</button>
          <button class="tab-btn" data-collection="app.bsky.graph.follow">Follows</button>
          <button class="tab-btn" data-collection="app.bsky.graph.block">Blocks</button>
        </div>
        <div class="chart tall" id="heatmap-chart"></div>
      </div>
      <div class="chart-container" style="grid-column: span 2;">
        <h3>Activity Timeline</h3>
        <div class="chart tall" id="timeline-chart"></div>
      </div>
      <div class="chart-container" style="grid-column: span 2;">
        <h3>Typical Day</h3>
        <div class="chart tall" id="typical-day-chart"></div>
      </div>
      <div class="chart-container">
        <h3>Content Breakdown</h3>
        <div class="chart" id="ratios-chart"></div>
      </div>
      <div class="chart-container">
        <h3>Top Interactions</h3>
        <div id="interactions-switcher">
          <button class="tab-btn active" data-filter="all">All</button>
          <button class="tab-btn" data-filter="reply">Replies</button>
          <button class="tab-btn" data-filter="app.bsky.feed.repost">Reposts</button>
          <button class="tab-btn" data-filter="app.bsky.feed.like">Likes</button>
        </div>
        <div class="chart" id="interactions-chart"></div>
      </div>
      <div class="chart-container" style="grid-column: span 2;">
        <h3>Social Graph Timeline</h3>
        <div class="chart tall" id="social-chart"></div>
      </div>
      <div class="chart-container" style="grid-column: span 2;">
        <h3>Sleep Pattern</h3>
        <div class="chart tall" id="sleep-chart"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
