<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bsky-viz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #e0e0e0; }
    .header { padding: 1.5rem 2rem; border-bottom: 1px solid #1a1a2e; display: flex; align-items: center; gap: 1rem; }
    .header h1 { font-size: 1.5rem; color: #0085ff; }
    .controls { padding: 1.5rem 2rem; display: flex; gap: 1rem; align-items: center; }
    .controls input { padding: 0.5rem 1rem; border: 1px solid #333; border-radius: 6px; background: #111; color: #e0e0e0; font-size: 1rem; width: 350px; }
    .controls button { padding: 0.5rem 1.5rem; border: none; border-radius: 6px; background: #0085ff; color: white; cursor: pointer; font-size: 1rem; }
    .controls button:hover { background: #006acc; }
    .controls button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { padding: 0 2rem; color: #888; font-size: 0.9rem; min-height: 1.5rem; }
    .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; padding: 1.5rem 2rem; }
    .card { background: #111; border: 1px solid #222; border-radius: 8px; padding: 1rem; text-align: center; }
    .card .value { font-size: 2rem; font-weight: bold; color: #0085ff; }
    .card .label { font-size: 0.85rem; color: #888; margin-top: 0.25rem; }
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; padding: 1.5rem 2rem; }
    .chart-container { background: #111; border: 1px solid #222; border-radius: 8px; padding: 1rem; }
    .chart-container h3 { margin-bottom: 0.75rem; font-size: 1rem; color: #ccc; }
    .chart { width: 100%; height: 350px; }
    .chart.tall { height: 500px; }
    .hidden { display: none; }
    .date-range { padding: 12px 20px; display: flex; align-items: center; gap: 8px; }
    .date-range .crumb { cursor: pointer; color: #0085ff; font-size: 14px; }
    .date-range .crumb:hover { text-decoration: underline; }
    .date-range .crumb.active { color: #fff; cursor: default; }
    .date-range .separator { color: #666; }
    @media (max-width: 900px) { .charts { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>bsky-viz</h1>
    <span style="color:#666">ATproto Repo Metadata Analyzer</span>
  </div>
  <div class="controls">
    <input type="text" id="did-input" placeholder="Enter DID or handle (e.g., alice.bsky.social)" />
    <button id="load-btn">Analyze</button>
    <select id="repo-select" style="padding:0.5rem;background:#111;color:#e0e0e0;border:1px solid #333;border-radius:6px;">
      <option value="">Previously analyzed...</option>
    </select>
  </div>
  <div class="status" id="status"></div>
  <div id="dashboard" class="hidden">
    <div id="date-range" class="date-range hidden">
      <span class="breadcrumb" id="date-breadcrumb"></span>
    </div>
    <div class="summary-cards" id="summary-cards"></div>
    <div class="charts">
      <div class="chart-container" style="grid-column: span 2;">
        <h3>Activity Heatmap</h3>
        <div class="chart tall" id="heatmap-chart"></div>
      </div>
      <div class="chart-container" style="grid-column: span 2;">
        <h3>Activity Timeline</h3>
        <div class="chart tall" id="timeline-chart"></div>
      </div>
      <div class="chart-container">
        <h3>Content Breakdown</h3>
        <div class="chart" id="ratios-chart"></div>
      </div>
      <div class="chart-container">
        <h3>Top Interactions</h3>
        <div class="chart" id="interactions-chart"></div>
      </div>
      <div class="chart-container" style="grid-column: span 2;">
        <h3>Social Graph Timeline</h3>
        <div class="chart tall" id="social-chart"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
